<div class="compagnie-page">
  <form [formGroup]="form" class="compagnie-form" (ngSubmit)="save()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Abrégé</mat-label>
      <input matInput formControlName="abrege" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nom Compagnie</mat-label>
      <input matInput formControlName="nomCompagnie" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Téléphone</mat-label>
      <input matInput formControlName="telephone" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Siège</mat-label>
      <input matInput formControlName="siege" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <input matInput formControlName="description" />
    </mat-form-field>

    <div class="actions">
      <button mat-flat-button color="primary" type="submit">{{ editingId ? 'Modifier' : 'Ajouter' }}</button>
      <button mat-button type="button" (click)="resetForm()">Annuler</button>
    </div>
  </form>

  <table mat-table [dataSource]="data" class="mat-elevation-z1 compagnie-table">
    <ng-container matColumnDef="abrege">
      <th mat-header-cell *matHeaderCellDef>Abrégé</th>
      <td mat-cell *matCellDef="let element">{{ element.abrege }}</td>
    </ng-container>

    <ng-container matColumnDef="nomCompagnie">
      <th mat-header-cell *matHeaderCellDef>Nom Compagnie</th>
      <td mat-cell *matCellDef="let element">{{ element.nomCompagnie }}</td>
    </ng-container>

    <ng-container matColumnDef="telephone">
      <th mat-header-cell *matHeaderCellDef>Téléphone</th>
      <td mat-cell *matCellDef="let element">{{ element.telephone }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let element">{{ element.email }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="select(element)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="remove(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

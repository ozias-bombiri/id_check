<div class="page">

  <div class="container">

    <!-- HEADER -->
    <div class="page-header">
      <h2>Liste des axes</h2>
    </div>


    <!-- TABLE -->
    @if (axes.length > 0) {
      <div class="card">

        <div class="card-header">
          <h3>Liste des axes</h3>
        </div>

        <div class="table-container">
          <table mat-table [dataSource]="axes" class="custom-table">

            <ng-container matColumnDef="libelle">
              <th mat-header-cell *matHeaderCellDef>Libellé</th>
              <td mat-cell *matCellDef="let el">{{ el.libelle }}</td>
            </ng-container>

            <ng-container matColumnDef="distance">
              <th mat-header-cell *matHeaderCellDef>Distance</th>
              <td mat-cell *matCellDef="let el">{{ el.distance }}</td>
            </ng-container>

            <ng-container matColumnDef="tempsMoyen">
              <th mat-header-cell *matHeaderCellDef>Temps moyen</th>
              <td mat-cell *matCellDef="let el">{{ el.tempsMoyen }}</td>
            </ng-container>

            <ng-container matColumnDef="depart">
              <th mat-header-cell *matHeaderCellDef>Départ</th>
              <td mat-cell *matCellDef="let el">
                {{ el.depart?.libelle }}
              </td>
            </ng-container>

            <ng-container matColumnDef="arrive">
              <th mat-header-cell *matHeaderCellDef>Arrivée</th>
              <td mat-cell *matCellDef="let el">
                {{ el.arrive?.libelle }}
              </td>
            </ng-container>

            <ng-container matColumnDef="description">
              <th mat-header-cell *matHeaderCellDef>Description</th>
              <td mat-cell *matCellDef="let el">
                {{ el.description }}
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let el" class="actions">
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          </table>
        </div>

      </div>
    } @else {
      <div class="empty-state">
        <mat-icon>alt_route</mat-icon>
        <p>Aucun axe trouvé</p>
      </div>
    }

  </div>
</div>

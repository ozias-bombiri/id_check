<div class="connexion">
	<div class="conn-card">
		<div class="brand">
			<img src="assets/images/logo_wuri_bf_final4.png" alt="Logo" />
			<h2>Connexion</h2>
			<p class="subtitle">Accédez au portail de vérification d'identité</p>
		</div>

		<form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
			<mat-form-field appearance="outline" class="full">
				<mat-label>Email</mat-label>
				<input matInput placeholder="Ex: checker1" formControlName="email" type="text" />
			</mat-form-field>

			<mat-form-field appearance="outline" class="full">
				<mat-label>Mot de passe</mat-label>
				<input matInput placeholder="••••••" type="password" formControlName="password" />
			</mat-form-field>

			<div class="actions">
				<button mat-flat-button color="primary" type="submit" [disabled]="loading">Se connecter</button>
				<mat-spinner *ngIf="loading" diameter="28"></mat-spinner>
			</div>

			<div class="meta">
				<a class="forgot" routerLink="/forgot">Mot de passe oublié ?</a>
			</div>

			<div class="error" *ngIf="error">{{ error }}</div>
		</form>
	</div>
</div>
